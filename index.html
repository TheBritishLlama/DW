<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smash Karts - Play Online</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0f1e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', 'Poppins', sans-serif;
        }
        .game-container {
            width: 100vw;
            height: 100vh;
            background: #000;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            overflow: hidden;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 1rem;
            backdrop-filter: blur(8px);
            pointer-events: none;
            z-index: 10;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        @media (max-width: 768px) {
            .loader { font-size: 0.85rem; padding: 8px 18px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="loader" id="loadingMessage">Loading Smash Karts... 🎮</div>
    <iframe 
        src="https://smash-karts.com/?embed=1" 
        title="Smash Karts - Multiplayer Kart Battle Game"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
        allowfullscreen
        loading="eager"
        importance="high"
        onload="document.getElementById('loadingMessage').style.display='none'">
    </iframe>
</div>
</body>
</html>
